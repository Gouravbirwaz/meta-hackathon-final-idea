# KisanAgent GRPO Training Configuration
# Used by train_grpo_unsloth.ipynb
# Mirrors Round 1 training pattern

model:
  name: "unsloth/Qwen2.5-7B-Instruct-bnb-4bit"
  max_seq_length: 2048
  load_in_4bit: true

lora:
  r: 16
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  lora_alpha: 16
  lora_dropout: 0
  bias: "none"
  use_gradient_checkpointing: "unsloth"

training:
  total_episodes: 500
  max_steps_per_episode: 90
  batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 5.0e-6
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  weight_decay: 0.01
  max_grad_norm: 0.1
  num_generations: 4         # GRPO group size
  temperature: 0.9           # sampling temperature for GRPO rollouts
  kl_coef: 0.05              # KL penalty coefficient
  clip_range: 0.2            # PPO clip range
  seed: 42

curriculum:
  stages:
    - name: "easy"
      episode_range: [0, 150]
      difficulty: "easy"
    - name: "medium"
      episode_range: [150, 350]
      difficulty: "medium"
    - name: "hard"
      episode_range: [350, 500]
      difficulty: "hard"

environment:
  server_url: "http://localhost:8000"
  max_tool_calls_per_step: 3
  tool_budget_penalty: -0.1

reward:
  primary: "composite_score"        # from KisanGrader (0-1)
  shaping_weight: 0.1               # per-step reward shaping multiplier
  terminal_weight: 1.0              # terminal reward weight
  income_weight: 0.40
  tool_use_weight: 0.20
  pest_response_weight: 0.20
  scheme_capture_weight: 0.10
  sustainability_weight: 0.10

output:
  save_dir: "checkpoints/kisanagent"
  eval_every_n_episodes: 10
  log_every_n_steps: 5
  save_every_n_episodes: 50
  training_log_path: "eval/training_log.json"
